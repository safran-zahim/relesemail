services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: email-generator-app
    ports:
      - "${HOST_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      GMAIL_CLIENT_ID: ${GMAIL_CLIENT_ID}
      GMAIL_CLIENT_SECRET: ${GMAIL_CLIENT_SECRET}
      GMAIL_REFRESH_TOKEN: ${GMAIL_REFRESH_TOKEN}
      GMAIL_USER: ${GMAIL_USER}
      GMAIL_REDIRECT_URI: ${GMAIL_REDIRECT_URI:-https://developers.google.com/oauthplayground}
      MY_SECRET_KEY: ${MY_SECRET_KEY}
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000/',res=>process.exit(res.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
